{% extends "base.html" %}
{% block content %}
<h1>Обзор</h1>
<div class="grid" style="grid-template-columns:repeat(4,1fr)">
  <div class="metric"><div class="l">В реестре</div><div class="n">{{ total }}</div></div>
  <div class="metric"><div class="l">Подтвердили телефон</div><div class="n">{{ confirmed }}</div></div>
  <div class="metric"><div class="l">Профилей собрано</div><div class="n">{{ profiles }}</div></div>
  <div class="metric"><div class="l">Документов</div><div class="n">{{ docs }}</div></div>
</div>
{% endblock %}
