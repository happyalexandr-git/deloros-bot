<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Деловая Россия · Иркутская область — панель</title>
<style>
  :root{
    --bg:#eef1f7; --text:#1f3556; --text2:#5a6b85; --muted:#7186a3;
    --card:#ffffff; --cardb:#e4e9f1; --shadow:0 4px 16px rgba(30,55,100,.08);
    --accent:#2f63b0; --accent-deep:#274896; --accent-bg:#e2e9f5;
    --ok:#2f8f6b; --ok-bg:#e1f5ee; --danger:#a32d2d; --danger-bg:#fbe9e9;
  }
  *{box-sizing:border-box}
  html{position:relative; min-height:100%}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size:15px; line-height:1.6;}
  .wavebg{position:absolute; inset:0; width:100%; height:100%; min-height:100vh; z-index:0; pointer-events:none}
  a{color:var(--accent); text-decoration:none}
  .wrap{max-width:860px; margin:0 auto; padding:0 18px; position:relative; z-index:1}
  header{position:relative; z-index:1}
  .nav{display:flex; align-items:center; gap:22px; height:64px}
  .brand{display:flex; align-items:center; gap:10px}
  .brand img{height:24px; display:block}
  .brand .region{font-size:13px; color:var(--text2); border-left:1px solid var(--cardb); padding-left:10px}
  .tabs{display:flex; gap:20px; margin-left:14px}
  .tabs a{color:var(--text2); padding:20px 0; border-bottom:2px solid transparent; font-size:14px}
  .tabs a.active{color:var(--accent); border-bottom-color:var(--accent)}
  .right{margin-left:auto; font-size:13px; color:var(--muted)}
  main{padding:22px 0 40px; position:relative; z-index:1}
  h1{font-size:21px; font-weight:600; margin:0 0 18px; color:var(--text)}
  .card{background:var(--card); border:1px solid var(--cardb); border-radius:14px; box-shadow:var(--shadow); padding:18px 20px}
  .row{display:flex; justify-content:space-between; align-items:center; gap:12px;
    background:var(--card); border:1px solid var(--cardb); border-radius:12px; box-shadow:var(--shadow); padding:12px 16px; margin-bottom:10px}
  .muted{color:var(--muted)}
  .badge{font-size:12px; padding:3px 11px; border-radius:8px}
  .badge.ok{color:var(--ok); background:var(--ok-bg)}
  .badge.wait{color:var(--muted); background:var(--accent-bg)}
  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px}
  .metric{background:var(--card); border:1px solid var(--cardb); border-radius:14px; box-shadow:var(--shadow); padding:16px 18px}
  .metric .n{font-size:28px; font-weight:600}
  .metric .l{font-size:13px; color:var(--muted)}
  input,button{font:inherit}
  input[type=text]{height:40px; padding:0 13px; border:1px solid var(--cardb); border-radius:10px; background:#fff; color:var(--text); width:100%}
  input[type=text]:focus{outline:none; border-color:var(--accent)}
  button{height:40px; padding:0 18px; border:1px solid var(--cardb); border-radius:10px; background:#fff; color:var(--text); cursor:pointer}
  button.primary{background:var(--accent); color:#fff; border-color:var(--accent)}
  button.link{border:none; background:none; color:var(--danger); padding:4px 6px; height:auto}
  .notice{padding:11px 15px; border-radius:10px; margin-bottom:16px; font-size:14px}
  .notice.ok{color:var(--ok); background:var(--ok-bg)}
  .notice.err{color:var(--danger); background:var(--danger-bg)}
  form.inline{display:flex; gap:10px; margin:0}
</style>
</head>
<body>
<svg class="wavebg" viewBox="0 0 1440 2240" preserveAspectRatio="xMidYMin slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <path d="M-80,190 C400,60 640,-160 1520,-420" fill="none" stroke="#c7d6ee" stroke-width="5" opacity="0.9"/>
  <path d="M-80,270 C450,130 690,-100 1520,-340" fill="none" stroke="#dbe5f4" stroke-width="19" opacity="0.7"/>

  <path d="M-80,690 C480,540 750,240 1520,-50" fill="none" stroke="#b9cced" stroke-width="5" opacity="0.9"/>
  <path d="M-80,770 C530,620 800,320 1520,30" fill="none" stroke="#d6e1f2" stroke-width="32" opacity="0.7"/>
  <path d="M-80,850 C560,700 850,400 1520,130" fill="none" stroke="#e4ebf6" stroke-width="54" opacity="0.8"/>

  <path d="M-80,1220 C510,1120 830,830 1520,540" fill="none" stroke="#c7d6ee" stroke-width="5" opacity="0.85"/>
  <path d="M-80,1300 C560,1200 900,910 1520,620" fill="none" stroke="#dbe5f4" stroke-width="26" opacity="0.65"/>

  <path d="M-80,1730 C530,1650 900,1380 1520,1060" fill="none" stroke="#b9cced" stroke-width="4" opacity="0.8"/>
  <path d="M-80,1810 C580,1730 950,1460 1520,1140" fill="none" stroke="#d6e1f2" stroke-width="38" opacity="0.6"/>

  <path d="M-80,2210 C560,2140 960,1890 1520,1570" fill="none" stroke="#e4ebf6" stroke-width="48" opacity="0.7"/>
</svg>
<header>
  <div class="wrap">
    <nav class="nav">
      <a class="brand" href="/overview">
        <img src="/static/logo-5.svg" alt="Деловая Россия">
        <span class="region">Иркутская область</span>
      </a>
      <div class="tabs">
        <a class="{% if tab=='overview' %}active{% endif %}" href="/overview">Обзор</a>
        <a class="{% if tab=='roster' %}active{% endif %}" href="/roster">Реестр</a>
        <a class="{% if tab=='documents' %}active{% endif %}" href="/documents">Документы</a>
        <a class="{% if tab=='about' %}active{% endif %}" href="/about">О боте</a>
      </div>
      <span class="right">{{ admin_name }} · <a href="/logout">выход</a></span>
    </nav>
  </div>
</header>
<main>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</main>
</body>
</html>
