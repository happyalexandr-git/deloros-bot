<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Делорос — админ-панель</title>
<style>
  :root{
    --bg:#f7f7f5; --surface:#ffffff; --text:#1f1f1d; --muted:#6b6b66;
    --border:#e6e5e0; --accent:#185fa5; --accent-bg:#e6f1fb;
    --ok:#0f6e56; --ok-bg:#e1f5ee; --danger:#a32d2d; --danger-bg:#fcebeb;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1a1a18; --surface:#242422; --text:#ececea; --muted:#9a9a93;
      --border:#34332f; --accent:#85b7eb; --accent-bg:#0c447c;
      --ok:#5dcaa5; --ok-bg:#085041; --danger:#f09595; --danger-bg:#791f1f;
    }
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:15px; line-height:1.6;}
  a{color:var(--accent); text-decoration:none}
  .wrap{max-width:840px; margin:0 auto; padding:0 16px}
  header{border-bottom:0.5px solid var(--border); background:var(--surface)}
  .nav{display:flex; align-items:center; gap:20px; height:54px}
  .brand{font-weight:500; margin-right:8px}
  .nav a.tab{color:var(--muted); padding:16px 0; border-bottom:2px solid transparent}
  .nav a.tab.active{color:var(--accent); border-bottom-color:var(--accent)}
  .nav .right{margin-left:auto; font-size:13px; color:var(--muted)}
  main{padding:24px 0}
  h1{font-size:20px; font-weight:500; margin:0 0 16px}
  .card{background:var(--surface); border:0.5px solid var(--border); border-radius:12px; padding:16px 18px}
  .row{display:flex; justify-content:space-between; align-items:center; gap:12px;
    border:0.5px solid var(--border); border-radius:8px; padding:10px 14px; margin-bottom:8px; background:var(--surface)}
  .muted{color:var(--muted)}
  .badge{font-size:12px; padding:2px 9px; border-radius:8px}
  .badge.ok{color:var(--ok); background:var(--ok-bg)}
  .badge.wait{color:var(--muted); background:var(--bg)}
  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px}
  .metric{background:var(--surface); border:0.5px solid var(--border); border-radius:12px; padding:14px 16px}
  .metric .n{font-size:26px; font-weight:500}
  .metric .l{font-size:13px; color:var(--muted)}
  input,button{font:inherit}
  input[type=text]{height:38px; padding:0 12px; border:0.5px solid var(--border);
    border-radius:8px; background:var(--surface); color:var(--text); width:100%}
  button{height:38px; padding:0 16px; border:0.5px solid var(--border); border-radius:8px;
    background:var(--surface); color:var(--text); cursor:pointer}
  button.primary{background:var(--accent); color:#fff; border-color:var(--accent)}
  button.link{border:none; background:none; color:var(--danger); padding:4px 6px; height:auto}
  .notice{padding:10px 14px; border-radius:8px; margin-bottom:14px; font-size:14px}
  .notice.ok{color:var(--ok); background:var(--ok-bg)}
  .notice.err{color:var(--danger); background:var(--danger-bg)}
  form.inline{display:flex; gap:10px; margin:0}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <nav class="nav">
      <span class="brand">Делорос</span>
      <a class="tab {% if tab=='overview' %}active{% endif %}" href="/overview">Обзор</a>
      <a class="tab {% if tab=='roster' %}active{% endif %}" href="/roster">Реестр</a>
      <a class="tab {% if tab=='about' %}active{% endif %}" href="/about">О боте</a>
      <span class="right">Александр · <a href="/logout">выход</a></span>
    </nav>
  </div>
</header>
<main>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</main>
</body>
</html>
